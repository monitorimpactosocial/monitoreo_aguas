<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=app/" />
    <title>Monitoreo de Agua PARACEL</title>
    <link rel="canonical" href="https://monitorimpactosocial.github.io/monitoreo_aguas/app/" />
    <style>
      :root {
        color-scheme: light;
        --green: #0f5d2f;
        --ink: #173326;
        --paper: #f7faf4;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        color: var(--ink);
        background: var(--paper);

      main {
        max-width: 560px;
        padding: 32px;
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        color: var(--green);
      }

      a {
        color: var(--green);
        font-weight: 700;
      }
    </style>
    <script>
      window.location.replace(new URL("app/", window.location.href));
    </script>
  </head>

    <main>
      <h1>Monitoreo de Agua PARACEL</h1>
      <p>Abriendo el tablero actualizado...</p>
